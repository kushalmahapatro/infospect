name: Check Version

on:
  workflow_call:
    secrets:
      TRIGGER_NEXT_ACTION: 
        required: true
        description: 'Trigger Next Action'
  
  pull_request:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Get version
      id: yq
      uses: mikefarah/yq@master
      with:
        cmd: yq -r '.version' 'pubspec.yaml'

    - name: Get package name
      id: package
      uses: mikefarah/yq@master
      with:
        cmd: yq -r '.name' 'pubspec.yaml'

    - name: Print version
      run: echo ${{ steps.yq.outputs.result }}
    
    - name: Get Latest Published Version
      id: get_latest
      run: |
        PACKAGE_NAME=${{ steps.package.outputs.result }}
        LATEST=$(curl -sS "https://pub.dev/api/packages/${PACKAGE_NAME}" | jq -r '.latest.version')
        if [[ -z "$LATEST" || "$LATEST" == "null" ]]; then
          echo "Failed to resolve latest published version for ${PACKAGE_NAME}"
          exit 1
        fi
        echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

    - name: Print version
      run: echo "provided_version=${{ steps.yq.outputs.result }} and latest_published=${{ steps.get_latest.outputs.latest }}"

    - name: Check Version
      id: check_version
      run: |
        latest_version=${{ steps.get_latest.outputs.latest }}
        provided_version=$(echo "${{ steps.yq.outputs.result }}" | sed 's/^v//')

        echo "latest_version=${latest_version} and provided_version=${provided_version}"

        if [[ "$provided_version" == "$latest_version" ]]; then
          echo "Provided version is equal to latest published version"
          echo "trigger_next_action=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        # Proper semver ordering (avoid bash string comparison).
        lowest=$(printf '%s\n' "$latest_version" "$provided_version" | sort -V | head -n1)
        if [[ "$lowest" == "$provided_version" ]]; then
          echo "Provided version is less than latest published version"
          echo "trigger_next_action=false" >> "$GITHUB_OUTPUT"
          exit 1
        fi

        echo "trigger_next_action=true" >> "$GITHUB_OUTPUT"

    - name: Trigger Next Action
      run: |
        echo "Trigger Next Action ${{ steps.check_version.outputs.trigger_next_action }}"
        echo "set-env:TRIGGER_NEXT_ACTION=${{ steps.check_version.outputs.trigger_next_action}}" >> $GITHUB_ENV
      env:
        TRIGGER_NEXT_ACTION: ${{ steps.check_version.outputs.trigger_next_action }}